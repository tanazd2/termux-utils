name: Auto Update Social Preview

# ✅ Force Node 24 BEFORE any step, treat warnings as non-fatal
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/social-preview.png'
  release:
    types:
      - published
  schedule:
    - cron: '50 18 * * *'  # 00:20 IST
    - cron: '50 21 * * *'  # 03:20 IST
    - cron: '50 6  * * *'  # 12:20 IST
    - cron: '50 12 * * *'  # 18:20 IST

jobs:
  update-social-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch GitHub Open Graph preview
        run: |
          REPO_OWNER="tanazd2"
          REPO_NAME="termux-utils"
          PREVIEW_URL="https://opengraph.githubassets.com/1/${REPO_OWNER}/${REPO_NAME}"
          mkdir -p .github
          echo "Downloading social preview from $PREVIEW_URL …"
          # Retry 3x, non-fatal
          curl -fL --retry 3 --retry-delay 2 "$PREVIEW_URL" -o .github/social-preview.png \
            || echo "⚠️ Failed to download social preview. Skipping update."

      - name: Commit and push social preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/social-preview.png
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update social preview [skip ci]"
            git push
          else
            echo "No changes to commit. Skipping push."
