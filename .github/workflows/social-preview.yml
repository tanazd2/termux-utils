name: Auto Update Social Preview

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  schedule:
    - cron: '20 0 * * *'  # Daily at 00:20 UTC

jobs:
  update-social-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch GitHub Open Graph preview
        run: |
          REPO_OWNER="tanazd2"
          REPO_NAME="termux-utils"
          PREVIEW_URL="https://opengraph.githubassets.com/1/${REPO_OWNER}/${REPO_NAME}"
          mkdir -p .github
          curl -L "$PREVIEW_URL" -o .github/social-preview.png

      - name: Commit and push social preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/social-preview.png
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update social preview [skip ci]"
            git push
          else
            echo "No changes to commit, skipping push"
